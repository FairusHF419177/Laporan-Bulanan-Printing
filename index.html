function setStatus(msg, kind){
  var el = document.getElementById('connectStatus');
  el.textContent = msg;
  el.className = kind ? ('status-'+kind) : '';
  el.style.display = msg ? 'block' : 'none';
}

async function verifyConnection(scriptUrl, sheetId){
  var verifyUrl = scriptUrl + (scriptUrl.indexOf('?')>-1 ? '&' : '?') + 'action=verify&spreadsheetId=' + encodeURIComponent(sheetId);
  var res = await fetch(verifyUrl, {method:'GET'});
  var data = await res.json();
  return data;
}

async function attemptConnect(){
  var scriptInput = document.getElementById('scriptUrlInput');
  var sheetInput = document.getElementById('sheetIdInput');
  var btn = document.getElementById('btnConnect');
  var url = scriptInput.value.trim();
  var sheetId = extractSheetId(sheetInput.value);

  if(!url || url.indexOf('PASTE_') === 0){ setStatus('Isi dulu URL Web App Apps Script.', 'err'); return; }
  if(!sheetId){ setStatus('Isi dulu link atau ID spreadsheet.', 'err'); return; }

  btn.disabled = true;
  setStatus('Menghubungkan...', 'warn');
  SCRIPT_URL = url;
  SPREADSHEET_ID = sheetId;

  try{
    var data = await verifyConnection(url, sheetId);
    if(data && data.ok){
      setStatus('', null);
      showConnectedBadge(data.name);
      toast('Terhubung ke "'+data.name+'".');
    } else {
      setStatus('Gagal terhubung: ' + (data && data.error ? data.error : 'ID atau URL tidak valid.'), 'err');
    }
  }catch(e){
    // kemungkinan dibatasi CORS oleh browser -- tetap simpan koneksi tapi tanpa nama terverifikasi
    setStatus('Tidak bisa memverifikasi nama file (kemungkinan dibatasi browser), tapi koneksi tetap disimpan.', 'warn');
    showConnectedBadge(null);
  }
  btn.disabled = false;
}

function checkSetup(){
  var urlSheet = getUrlParam('sheet');
  if(urlSheet){ SPREADSHEET_ID = extractSheetId(urlSheet); }

  var needsScript = !SCRIPT_URL || SCRIPT_URL.indexOf('PASTE_') === 0;
  var needsSheet = !SPREADSHEET_ID;

  document.getElementById('btnConnect').addEventListener('click', attemptConnect);

  if(needsScript || needsSheet){
    document.getElementById('lhSetup').style.display = 'block';
    document.getElementById('lhSetupOk').style.display = 'none';
    var scriptInput = document.getElementById('scriptUrlInput');
    var sheetInput = document.getElementById('sheetIdInput');
    if(!needsScript) scriptInput.value = SCRIPT_URL;
    if(!needsSheet) sheetInput.value = SPREADSHEET_ID;
    return false;
  }
  // sudah ada konfigurasi (mis. dari ?sheet= di URL) -- coba verifikasi otomatis
  document.getElementById('scriptUrlInput').value = SCRIPT_URL;
  document.getElementById('sheetIdInput').value = SPREADSHEET_ID;
  attemptConnect();
  return true;
}

function showConnectedBadge(name){
  if(!SPREADSHEET_ID) return;
  document.getElementById('lhSetup').style.display = 'none';
  document.getElementById('lhSetupOk').style.display = 'block';
  document.getElementById('activeSheetName').textContent = name || '(nama tidak terverifikasi)';
  document.getElementById('activeSheetId').textContent = SPREADSHEET_ID;
  document.getElementById('changeSheetLink').onclick = function(ev){
    ev.preventDefault();
    document.getElementById('lhSetup').style.display = 'block';
    document.getElementById('lhSetupOk').style.display = 'none';
    document.getElementById('sheetIdInput').value = SPREADSHEET_ID;
    setStatus('', null);
  };
}

async function sendToSheet(sheetName, values){
  var scriptInput = document.getElementById('scriptUrlInput');
  var sheetInput = document.getElementById('sheetIdInput');
  if((!SCRIPT_URL || SCRIPT_URL.indexOf('PASTE_') === 0) && scriptInput && scriptInput.value.trim()){
    SCRIPT_URL = scriptInput.value.trim();
  }
  if(!SPREADSHEET_ID && sheetInput && sheetInput.value.trim()){
    SPREADSHEET_ID = extractSheetId(sheetInput.value);
  }
  if(!SCRIPT_URL || SCRIPT_URL.indexOf('PASTE_') === 0){
    toast('Belum ada URL Apps Script. Tempel dulu di kotak atas.');
    return false;
  }
  if(!SPREADSHEET_ID){
    toast('Belum ada ID spreadsheet bulan ini. Tempel dulu di kotak atas.');
    return false;
  }
  try{
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ spreadsheetId: SPREADSHEET_ID, sheet: sheetName, values: values })
    });
    // mode no-cors -> respons tidak bisa dibaca, kita anggap terkirim
    return true;
  }catch(e){
    toast('Gagal mengirim (cek koneksi internet).');
    return false;
  }
}

function renderTabs(){
  var wrap = document.getElementById('lhTabs');
  var order = ['INP1','INP2','INP3','INP4','SPAREPART'];
  wrap.innerHTML = order.map(function(k){
    var m = META[k];
    var count = (cache[k]||[]).filter(function(e){return e.tanggal===todayStr();}).length;
    return '<div class="lh-tab'+(k===activeTab?' active':'')+'" data-tab="'+k+'" style="--accent:'+m.color+'">'+
      '<span class="dot"></span>'+m.short+
      (count>0?' <span style="opacity:.6">('+count+')</span>':'')+
      '</div>';
  }).join('');
  Array.prototype.forEach.call(wrap.querySelectorAll('.lh-tab'), function(el){
    el.addEventListener('click', function(){ switchTab(el.getAttribute('data-tab')); });
  });
}

function switchTab(tab){
  activeTab = tab;
  renderTabs();
  if(tab==='SPAREPART') renderSparepartPanel(); else renderMachinePanel(tab);
}

function renderMachinePanel(tab){
  var m = META[tab];

  body.style.setProperty('--accent', m.color);

    '<div class="lh-grid" style="margin-top:6px">'+
      '<div class="lh-field"><label>Tanggal</label><input type="date" id="f_tanggal" value="'+todayStr()+'"></div>'+
      '<div class="lh-field"><label>Shift</label><div class="lh-shift" id="f_shift">'+
        [1,2,3].map(function(s){return '<button type="button" data-shift="'+s+'" class="'+(draftShift[tab]===s?'active':'')+'">'+s+'</button>';}).join('')+
      '</div></div>'+
      '<div class="lh-field"><label>Produk</label><select id="f_produk">'+productOptions+'</select></div>'+
    '</div>'+
    '<div class="lh-grid g2" style="margin-top:10px">'+
      '<div class="lh-field"><label>Tipe</label><select id="f_tipe"></select></div>'+
      '<div class="lh-field"><label>Nama Pelapor</label><input type="text" id="f_pelapor" placeholder="Nama operator"></div>'+
    '</div>'+
    '<div class="lh-section-title">Hasil Produksi</div>'+
    '<div class="lh-grid">'+
      '<div class="lh-field"><label>Hasil (pcs)</label><input type="number" id="f_hasil" min="0"></div>'+
      '<div class="lh-field"><label>Reject Polos</label><input type="number" id="f_rpolos" min="0"></div>'+
      '<div class="lh-field"><label>Reject Print</label><input type="number" id="f_rprint" min="0"></div>'+
    '</div>'+
    '<div class="lh-counter" style="margin-top:10px"><div class="lh-counter-head"><div class="name">JUMLAH (Hasil + Reject Polos + Reject Print)</div><div class="pakai" id="f_jumlah_display">0</div></div></div>'+
    '<div class="lh-section-title">Pemakaian Tinta (Drum)</div>'+
    '<div id="f_colors"></div>'+
    '<div class="lh-section-title">Pemakaian Methanol</div>'+
    '<div id="f_methanol"></div>'+
    '<div class="lh-section-title">Keterangan</div>'+
    '<div class="lh-field"><textarea id="f_ket" placeholder="Catatan gangguan, setting, perbaikan, dll."></textarea></div>'+
    '<button class="lh-btn lh-btn-primary" id="btnSave">Simpan Laporan</button>'+
    '<div class="lh-note">Ada 2 produk dalam shift yang sama? Simpan laporan produk pertama, lalu ulangi form dengan tanggal &amp; shift yang sama untuk produk kedua — keduanya masuk sebagai baris terpisah.</div>'+
    '<div class="lh-log"><div class="lh-section-title">Laporan Terakhir Dikirim (sesi ini)</div><div id="logList"></div></div>';

  Array.prototype.forEach.call(document.getElementById('f_shift').querySelectorAll('button'), function(b){
    b.addEventListener('click', function(){
      draftShift[tab] = parseInt(b.getAttribute('data-shift'),10);
      Array.prototype.forEach.call(document.getElementById('f_shift').querySelectorAll('button'), function(x){x.classList.remove('active');});
      b.classList.add('active');
    });
  });

  var produkSel = document.getElementById('f_produk');
  produkSel.addEventListener('change', updateTipeAndColors);
  function updateTipeAndColors(){
    var info = PRODUCTS[produkSel.value] || {types:[],colors:[]};
    document.getElementById('f_tipe').innerHTML = info.types.map(function(t){return '<option value="'+esc(t)+'">'+esc(t)+'</option>';}).join('');
    document.getElementById('f_colors').innerHTML = info.colors.map(function(c, idx){ return colorCard('C'+(idx+1), c); }).join('');
    document.getElementById('f_methanol').innerHTML = methanolCard();
    attachPakaiListeners();

  function colorCard(code, colorName){
    return '<div class="lh-counter" data-color-code="'+esc(code)+'" data-color-name="'+esc(colorName)+'">'+
      '<div class="lh-counter-head"><div class="name">'+code+' &middot; <span class="tag">'+esc(colorName)+'</span></div><div class="pakai" data-pakai="0">PAKAI 0</div></div>'+
      '<div class="lh-counter-row">'+
        '<div class="lh-field"><label>Awal</label><input type="number" class="c-awal" min="0" value="0"></div>'+
        '<div class="lh-field"><label>Ambil</label><input type="number" class="c-ambil" min="0" value="0"></div>'+
        '<div class="lh-field"><label>Akhir</label><input type="number" class="c-akhir" min="0" value="0"></div>'+
      '</div></div>';
  }
  function methanolCard(){
    return '<div class="lh-counter" data-methanol="1">'+
      '<div class="lh-counter-head"><div class="name">METHANOL</div><div class="pakai" data-pakai="0">PAKAI 0</div></div>'+
      '<div class="lh-counter-row">'+
        '<div class="lh-field"><label>Awal</label><input type="number" class="c-awal" min="0" value="0"></div>'+
        '<div class="lh-field"><label>Ambil</label><input type="number" class="c-ambil" min="0" value="0"></div>'+
        '<div class="lh-field"><label>Akhir</label><input type="number" class="c-akhir" min="0" value="0"></div>'+
      '</div></div>';
  }
  function attachPakaiListeners(){
    Array.prototype.forEach.call(document.querySelectorAll('#f_colors .lh-counter, #f_methanol .lh-counter'), function(card){
      var awal=card.querySelector('.c-awal'), ambil=card.querySelector('.c-ambil'), akhir=card.querySelector('.c-akhir');
      var pakaiEl = card.querySelector('[data-pakai]');
      function recalc(){
        var v = (parseFloat(awal.value)||0)+(parseFloat(ambil.value)||0)-(parseFloat(akhir.value)||0);
        pakaiEl.textContent = 'PAKAI '+v; pakaiEl.setAttribute('data-pakai', v);
      }
      [awal,ambil,akhir].forEach(function(i){ i.addEventListener('input', recalc); });
    });
  }
  updateTipeAndColors();

  function recalcJumlah(){
    var h = parseFloat(document.getElementById('f_hasil').value)||0;
    var rp = parseFloat(document.getElementById('f_rpolos').value)||0;
    var rpr = parseFloat(document.getElementById('f_rprint').value)||0;
    document.getElementById('f_jumlah_display').textContent = (h+rp+rpr);
  }
  ['f_hasil','f_rpolos','f_rprint'].forEach(function(id){
    document.getElementById(id).addEventListener('input', recalcJumlah);
  });

  document.getElementById('btnSave').addEventListener('click', function(){ saveMachineEntry(tab); });
  renderLog(tab);
}

async function saveMachineEntry(tab){
  var tanggal = document.getElementById('f_tanggal').value;
  var produk = document.getElementById('f_produk').value;
  var tipe = document.getElementById('f_tipe').value;
  if(!tanggal || !produk || !tipe){ toast('Lengkapi tanggal, produk, dan tipe dulu.'); return; }

  var values = {};
  values[1] = tanggal;
  values[2] = draftShift[tab];
  values[3] = produk;
  values[4] = tipe;
  values[5] = parseFloat(document.getElementById('f_hasil').value)||0;
  values[6] = parseFloat(document.getElementById('f_rpolos').value)||0;
  values[7] = parseFloat(document.getElementById('f_rprint').value)||0;

  var colorCards = document.querySelectorAll('#f_colors .lh-counter');
  Array.prototype.forEach.call(colorCards, function(card, idx){
    var base = COLOR_BLOCK_START + idx*5;   // I, N, S, X, AC, AH, AM
    // nama warna (base) TIDAK dikirim -- sudah otomatis terisi via rumus VLOOKUP ke sheet Warna
    values[base+1] = parseFloat(card.querySelector('.c-awal').value)||0;
    values[base+2] = parseFloat(card.querySelector('.c-ambil').value)||0;
    values[base+3] = parseFloat(card.querySelector('.c-akhir').value)||0;
    // base+4 = PAKAI, rumus otomatis, tidak dikirim
  });
  var mCard = document.querySelector('#f_methanol .lh-counter');
  values[METHANOL_AWAL_COL] = parseFloat(mCard.querySelector('.c-awal').value)||0;
  values[METHANOL_AWAL_COL+1] = parseFloat(mCard.querySelector('.c-ambil').value)||0;
  values[METHANOL_AWAL_COL+2] = parseFloat(mCard.querySelector('.c-akhir').value)||0;
  values[KETERANGAN_COL] = document.getElementById('f_ket').value||'';
  values[PELAPOR_COL] = document.getElementById('f_pelapor').value||'';

  toast('Mengirim...');
  var ok = await sendToSheet(tab, values);
  if(ok){
    var entry = {tanggal:tanggal, shift:draftShift[tab], produk:produk, tipe:tipe,
      hasil:values[5], keterangan:values[KETERANGAN_COL], pelapor:values[PELAPOR_COL]};
    cache[tab] = (cache[tab]||[]);
    cache[tab].unshift(entry);
    cache[tab] = cache[tab].slice(0,25);
    toast('Laporan '+META[tab].label+' terkirim ke Google Sheet.');
    renderTabs();
    renderLog(tab);
    document.getElementById('f_hasil').value='';
    document.getElementById('f_rpolos').value='';
    document.getElementById('f_rprint').value='';
    document.getElementById('f_jumlah_display').textContent='0';
    document.getElementById('f_ket').value='';
    Array.prototype.forEach.call(document.querySelectorAll('#f_colors input, #f_methanol input'), function(i){ i.value=0; });
    Array.prototype.forEach.call(document.querySelectorAll('[data-pakai]'), function(p){ p.textContent='PAKAI 0'; p.setAttribute('data-pakai','0'); });
  }
}

function renderLog(tab){
  var list = document.getElementById('logList');
  if(!list) return;
  var entries = cache[tab]||[];
  if(!entries.length){ list.innerHTML = '<div class="lh-log-empty">Belum ada laporan dikirim di sesi ini.</div>'; return; }
  list.innerHTML = entries.map(function(e){
    return '<div class="lh-entry">'+
      '<div class="meta">'+esc(e.tanggal)+' &middot; SHIFT '+esc(e.shift)+' &middot; '+esc(e.pelapor||'-')+'</div>'+
      '<div class="main">'+esc(e.produk)+' — '+esc(e.tipe)+' &middot; Hasil '+esc(e.hasil)+' pcs</div>'+
      '<div class="sub">'+esc(e.keterangan||'—')+'</div>'+
    '</div>';
  }).join('');
}

    '</div>'+

      '<div class="lh-field"><label>Cari Item + Tipe</label><input type="text" id="s_pick" list="sp_list" placeholder="mis. BEARING 6203"><datalist id="sp_list">'+datalistOpts+'</datalist></div>'+
      '<div class="lh-field"><label>Fungsi (otomatis)</label><input type="text" id="s_fungsi" readonly></div>'+
    '</div>'+
    '<div class="lh-grid g2" style="margin-top:10px">'+
      '<div class="lh-field"><label>Masuk (qty)</label><input type="number" id="s_masuk" min="0" value="0"></div>'+
      '<div class="lh-field"><label>Keluar (qty)</label><input type="number" id="s_keluar" min="0" value="0"></div>'+
    '</div>'+
    '<div class="lh-section-title">Keterangan</div>'+
    '<div class="lh-field"><textarea id="s_ket" placeholder="Untuk perbaikan apa, mesin mana, dll."></textarea></div>'+
    '<button class="lh-btn lh-btn-primary" id="btnSaveSp">Simpan Laporan</button>'+
    '<div class="lh-log"><div class="lh-section-title">Laporan Terakhir Dikirim (sesi ini)</div><div id="logList"></div></div>';

  document.getElementById('s_pick').addEventListener('input', function(){
    var val = this.value.trim();
    var match = SPAREPARTS.find(function(row){ return (row[0]+' '+row[1]).toLowerCase()===val.toLowerCase(); });
    document.getElementById('s_fungsi').value = match ? (match[2]||'—') : '';
  });
  document.getElementById('btnSaveSp').addEventListener('click', saveSparepartEntry);
  renderSparepartLog();
}

async function saveSparepartEntry(){
  var tanggal = document.getElementById('s_tanggal').value;
  var val = document.getElementById('s_pick').value.trim();
  var match = SPAREPARTS.find(function(row){ return (row[0]+' '+row[1]).toLowerCase()===val.toLowerCase(); });
  var item, tipe;
  if(match){ item=match[0]; tipe=match[1]; }
  else { var parts = val.split(' '); item=parts[0]||''; tipe=parts.slice(1).join(' '); }
  var masuk = parseFloat(document.getElementById('s_masuk').value)||0;
  var keluar = parseFloat(document.getElementById('s_keluar').value)||0;
  var ket = document.getElementById('s_ket').value||'';
  var pelapor = document.getElementById('s_pelapor').value||'';
  if(!tanggal || !item){ toast('Lengkapi tanggal dan item dulu.'); return; }
  if(masuk===0 && keluar===0){ toast('Isi jumlah Masuk atau Keluar.'); return; }

  // INSP columns: 1 CODE(formula,skip) 2 TANGGAL 3 ITEM 4 TIPE 5 MASUK 6 KELUAR 7 KETERANGAN 8 PELAPOR
  var values = {2:tanggal, 3:item, 4:tipe, 5:masuk||'', 6:keluar||'', 7:ket, 8:pelapor};
  toast('Mengirim...');
  var ok = await sendToSheet('INSP', values);
  if(ok){
    cache.SPAREPART = (cache.SPAREPART||[]);
    cache.SPAREPART.unshift({tanggal:tanggal, item:item, tipe:tipe, masuk:masuk, keluar:keluar, keterangan:ket});
    cache.SPAREPART = cache.SPAREPART.slice(0,25);
    toast('Laporan sparepart terkirim ke Google Sheet.');
    renderSparepartLog();
    document.getElementById('s_masuk').value=0;
    document.getElementById('s_keluar').value=0;
    document.getElementById('s_ket').value='';
    document.getElementById('s_pick').value='';
    document.getElementById('s_fungsi').value='';
  }
}

function renderSparepartLog(){
  var list = document.getElementById('logList');
  if(!list) return;
  var entries = cache.SPAREPART||[];
  if(!entries.length){ list.innerHTML = '<div class="lh-log-empty">Belum ada laporan dikirim di sesi ini.</div>'; return; }
  list.innerHTML = entries.map(function(e){
    var dir = e.masuk>0 ? ('+'+e.masuk+' masuk') : '';
    var dir2 = e.keluar>0 ? ('-'+e.keluar+' keluar') : '';
    return '<div class="lh-entry">'+
      '<div class="meta">'+esc(e.tanggal)+'</div>'+
      '<div class="main">'+esc(e.item)+' '+esc(e.tipe)+' &middot; '+[dir,dir2].filter(Boolean).join(' / ')+'</div>'+
      '<div class="sub">'+esc(e.keterangan||'—')+'</div>'+
    '</div>';
  }).join('');
}

function init(){
  checkSetup();
  renderTabs();
  renderMachinePanel('INP1');
}
init();

})();
</script>
